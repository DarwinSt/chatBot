spring:
  config:
    activate:
      on-profile: local
  application:
    name: financebot
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/financesbot}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8080}

app:
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:8580733376:AAHHnR5hjSHOhW3kCwy-XF9k2zbZjwtX69Q}
    webhook-secret: ${TELEGRAM_WEBHOOK_SECRET:}
  # Telegram exige HTTPS para setWebhook; en local usa un túnel (ngrok, cloudflare) y APP_BASE_URL=https://...
  base-url: ${APP_BASE_URL:http://localhost:${SERVER_PORT:8080}}
