spring:
  application:
    name: financebot
  # Credenciales BD: copiar application-db.yml.example → application-db.yml (raíz del proyecto)
  config:
    import: optional:file:./application-db.yml
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/financesbot}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Esquema gestionado manualmente en PostgreSQL; no validar ni modificar tablas al arrancar
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

app:
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    webhook-secret: ${TELEGRAM_WEBHOOK_SECRET:}
  base-url: ${APP_BASE_URL:http://localhost:${SERVER_PORT:8080}}
